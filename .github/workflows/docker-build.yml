name: Docker Build & Push

# 每次推送代码时自动构建并推送镜像
on:
    push:
        branches:
            - main
            - master
            - v3
    # 支持手动触发
    workflow_dispatch:

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Normalize image name (lowercase)
              id: image
              run: |
                  IMG="$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')"
                  echo "name=$IMG" >> "$GITHUB_OUTPUT"
                  echo "Full image: ${{ env.REGISTRY }}/$IMG"

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up QEMU (multi-platform support)
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  # 同时构建 amd64（x86服务器）和 arm64（树莓派/部分NAS）
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
                      ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ github.sha }}
                  # 利用 GitHub Actions 缓存加速构建
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
